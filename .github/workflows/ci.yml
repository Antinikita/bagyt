name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    # Cheap first-pass guard against committed secrets (API keys,
    # private keys, .env leaks). Subsequent jobs depend on it so a
    # leaked credential never gets a successful CI run.
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Lint + test + build
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: NPM audit (CVE check)
        # `--production` skips dev-only deps. Fail on high+ severities;
        # moderate often noisy. Adjust as the dep tree matures.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        env:
          # The CSP plugin in vite.config.js calls new URL() on
          # VITE_API_URL during the build's transformIndexHtml step.
          # An empty string would blow up; this placeholder origin
          # keeps the build green without exposing a real backend.
          VITE_API_URL: http://ci-placeholder.local
        run: npm run build
