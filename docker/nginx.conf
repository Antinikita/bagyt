server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown route gets index.html, then React
    # Router decides what to render. Without this, a hard refresh on
    # /admin/dashboard returns 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits hashed asset filenames (-Abc123.js), so the bundle is
    # safe to cache forever. The hash changes when the source changes.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html itself must NOT be cached — it points at the latest
    # hashed assets, and we want clients to pick up new versions.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
